services:
  mysql:
    image: mysql:8.0
    container_name: temnacozinha_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: temnacozinha_ma
      MYSQL_USER: pedro
      MYSQL_PASSWORD: pedro123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: